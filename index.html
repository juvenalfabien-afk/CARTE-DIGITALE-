<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte de visite digitale - Pheno&Co</title>
  <style>
    :root{
      --gold:#d7a14b;
      --gold-soft:#f1c57a;
      --text:#f7f2ea;
      --muted:#d7d0c7;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(215,161,75,.18), transparent 24%),
        radial-gradient(circle at bottom, rgba(215,161,75,.12), transparent 18%),
        #000;
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(100%, 460px);
      background:linear-gradient(180deg, rgba(18,18,18,.96), rgba(8,8,8,.98));
      border:1.5px solid rgba(215,161,75,.85);
      border-radius:28px;
      padding:24px 18px 22px;
      box-shadow:0 0 0 1px rgba(255,214,153,.08) inset, 0 12px 40px rgba(0,0,0,.55);
      position:relative;
      overflow:hidden;
    }
    .glow{
      position:absolute; inset:auto 10% 0 10%; height:2px;
      background:linear-gradient(90deg, transparent, var(--gold-soft), transparent);
      box-shadow:0 0 18px rgba(241,197,122,.85);
    }
    .glow.top{top:0; bottom:auto;}
    .brand{text-align:center; margin-bottom:14px;}
    .brand img{width:88%; max-width:340px; height:auto; display:block; margin:0 auto;}
    .tagline{text-align:center; color:var(--gold-soft); font-weight:700; font-size:1.25rem; margin-bottom:3px;}
    .subline{text-align:center; color:var(--muted); font-size:.95rem; margin-bottom:5px;}
    .loc{text-align:center; color:var(--text); font-weight:700; line-height:1.5; margin-bottom:12px;}
    .section-title{
      display:flex; align-items:center; gap:12px;
      margin:0 0 10px;
      color:var(--gold-soft); font-weight:800; font-size:1.05rem;
      justify-content:center;
    }
    .section-title::before, .section-title::after{
      content:""; height:1px; flex:1;
      background:linear-gradient(90deg, transparent, rgba(215,161,75,.8), transparent);
    }
    .buttons{display:grid; gap:9px;}
    .btn{
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; text-decoration:none; color:#fff8ef;
      background:linear-gradient(180deg, rgba(215,161,75,.18), rgba(215,161,75,.08));
      border:1px solid rgba(215,161,75,.6);
      border-radius:16px; padding:13px;
      font-weight:800; font-size:1rem;
      transition:.2s ease;
      cursor:pointer;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .btn:hover{transform:translateY(-1px); background:linear-gradient(180deg, rgba(215,161,75,.24), rgba(215,161,75,.10));}
    .quote{
      text-align:center; color:var(--gold-soft);
      font-family: Georgia, "Times New Roman", serif;
      font-style:italic; font-size:1.35rem; line-height:1.35; margin-top:16px;
    }
    .overlay{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.85); z-index:100;
      align-items:center; justify-content:center; padding:20px;
    }
    .overlay.open{display:flex;}
    .popup{
      background:linear-gradient(180deg, #161616, #0a0a0a);
      border:1.5px solid rgba(215,161,75,.8);
      border-radius:24px; padding:28px 22px;
      width:min(100%, 420px); max-height:85vh;
      overflow-y:auto; position:relative;
    }
    .popup-close{
      position:absolute; top:14px; right:16px;
      background:none; border:none; color:var(--gold-soft);
      font-size:1.6rem; cursor:pointer; line-height:1;
    }
    .popup img.logo-popup{width:65%; max-width:200px; display:block; margin:0 auto 16px;}
    .popup-section{
      margin:16px 0 8px; color:var(--gold-soft); font-weight:800;
      font-size:.95rem; text-align:center; letter-spacing:1px;
      border-bottom:1px solid rgba(215,161,75,.3); padding-bottom:6px;
    }
    .horaires{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0;}
    .horaire-box{border:1px solid rgba(215,161,75,.4); border-radius:12px; padding:10px; text-align:center;}
    .horaire-box .jours{color:var(--muted); font-size:.85rem;}
    .horaire-box .heures{color:var(--gold-soft); font-weight:800; font-size:.95rem; margin-top:4px;}
    .info-line{text-align:center; color:var(--text); font-size:.95rem; margin:6px 0; line-height:1.5;}
    .info-line span{color:var(--gold-soft); font-weight:700;}
  </style>
</head>
<body>
  <main class="card">
    <div class="glow top"></div>
